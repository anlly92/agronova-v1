{% extends "base_header_2.html" %}
{% load static %}

{% block title %}
<title>Informe de ventas</title>
{% endblock %}

{% block extra_styles %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'ingresos_egresos/css/mensual_anual.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block logotipo %}
    Informe mensual de Ventas
{% endblock %}

{% block nav_icons %}

    <div class="boton">
        <button type="button" id="Calendario" title="Seleccionar año">
            <i class="fas fa-calendar-alt"></i>
        </button>
        <span>Fecha</span>
    </div>

    <div class="boton">
        <button type="button" id="descargarBtn" title="Descargar datos">
            <i class="fas fa-download"></i>
        </button>
        <span>Descargar</span>
    </div>

    <div class="boton salir">
        <button type="button" title="Cancelar e ir atrás">
            <a href="javascript:history.back()">✖</a>
        </button>
        <span>Salir</span>
    </div>
{% endblock %}

{% block content %}
<canvas class="grafica-container" id="verVentas"></canvas>

<!-- Librería Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{% static 'ingresos_egresos/js/grafica_de_ventas.js' %}"></script>
{% endblock %}
